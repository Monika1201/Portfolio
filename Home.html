<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Design</title>
    <link href="https://unpkg.com/boxicons/css/boxicons.min.css" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
       body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #a08bb7, #8e9093);
            font-family: 'Verdana', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }

        .loader {
            width: 100px;
            height: 100px;
            border: 10px solid rgba(255, 255, 255, 0.3);
            border-top: 10px solid #fff;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 1.8rem;
            margin-top: 20px;
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }

        .start-button {
            display: none;
            margin-top: 20px;
            background-color: #ffffff;
            color: #2575fc;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            animation: fade-in 2s ease-in-out forwards;
        }

        .start-button:hover {
            background-color: #6a11cb;
            color: #fff;
            transform: scale(1.1);
        }

        @keyframes fade-in {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        .portfolio {
            display: none; 
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a08bb7, #8e9093);
            color: #333;
            font-family: Arial, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(135deg, #a08bb7, #8e9093);
            color: #333;
        }

        header .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .menu a {
            margin-left: 20px;
            text-decoration: none;
            color: #f3eaea;
        }
        .menu a:hover {
            color: #e63946; 
        }

        .content-container {
            display: flex;
            justify-content: space-between; 
            align-items: center; 
            padding: 300px;
            height: calc(100vh - 80px);
            gap: 20px; 
            box-sizing: border-box;
        }
        .content-container .left-section {
            max-width: 50%;
            text-align: justify; 
        }

        .content-container .left-section h1 {
            font-size: 3rem;
            margin: 0;
        }

        .content-container .left-section h1 span {
            color: #e63946;
        }

        .content-container .left-section h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #e61763;
            margin: 10px 0;
        }

        .content-container .left-section p {
            font-size: 1rem;
            line-height: 1.6;
            color: #555;
        }

        .content-container .left-section .buttons {
            margin-top: 40px;
        }

        .content-container .left-section .buttons a {
            display: inline-block;
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: #e63946;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            margin-right: 10px;
            transition: background-color 0.3s;
        }

        .content-container .left-section .buttons a:hover {
            background-color: #d62828;
        }

        .content-container .right-section {
            display: flex;
            justify-content: flex-end; 
        }
    .content-container .right-section img {
        width: 300px;
        height: 300px;
        border-radius: 50%; 
        object-fit: cover; 
        border: 5px solid #ffffff; 
        transition: transform 0.5s ease, box-shadow 0.5s ease;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
    }
    .content-container .right-section img:hover {
        transform: scale(1.1);
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.5); 
    }
        .social-links {
            margin-top: 40px;
            display: flex;
            gap:10px;
        }

        .social-links a {
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            line-height: 1;
            margin-right: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
        }
        .social-links a.gmail {
            color: #d93025; 
        }

        .social-links a.linkedin {
            color: #0077b5;
        }

        .social-links a.github {
            color: #333; 
        }

        .social-links a.youtube {
            color: #ff0000; 
        }

        .social-links a.medium {
            color: #f2f5f4; 
        }

        .social-links a.twitter {
            color: #1da1f2; 
        }
        .social-links a:hover {
            background: #d7a1eb;
        }

        .typing {
            display: inline-block;
            border-right: 2px solid #e63946;
            white-space: nowrap;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container" id="loadingContainer">

    <div class="portfolio" id="portfolioContent">

        <div class="content-container">

                <div class="buttons">
                    <a href="D:\spotknack\About.html">About Me</a>

            </div>
            <div class="right-section">
                <img src="c:\Users\monik\AppData\Local\Packages\5319275A.WhatsAppDesktop_cv1g1gvanyjgm\TempState\E8D92F99EDD25E2CEF48ECA48320A1A5\WhatsApp Image 2024-12-02 at 14.41.51_0c3700c3.jpg" alt="Profile Photo">

    <script>
        setTimeout(() => {
            const loader = document.getElementById('loader');
            const loadingText = document.getElementById('loadingText');
            const startButton = document.getElementById('startButton');
            
            loader.style.display = 'none'; 
            loadingText.classList.add('hidden'); 
            startButton.style.display = 'inline-block'; 
        }, 2000);

        document.getElementById('startButton').addEventListener('click', () => {
            const loadingContainer = document.getElementById('loadingContainer');
            const portfolioContent = document.getElementById('portfolioContent');

            loadingContainer.style.display = 'none'; 
            portfolioContent.style.display = 'block'; 
        });
       
        const dynamicText = document.getElementById('dynamicText');
        const textArray = ['Frontend Developer', 'Web Designer', 'Pixel Perfectionist'];
        let index = 0;
        let textIndex = 0;

        function type() {
            if (textIndex < textArray[index].length) {
                dynamicText.textContent += textArray[index].charAt(textIndex);
                textIndex++;
                setTimeout(type, 150);
            } else {
                setTimeout(() => {
                    dynamicText.textContent = '';
                    textIndex = 0;
                    index = (index + 1) % textArray.length;
                    type();
                }, 2000);
            }
        }
        setTimeout(() => {
            type();
        }, 5000);
    </script>
</body>
</html>
